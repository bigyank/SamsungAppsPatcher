name: Build patched APKs

on:
  workflow_dispatch:
    inputs:
      apps:
        description: Apps to build (space-separated)
        required: true
        default: shealth
        type: string
      tag:
        description: Release tag (optional, e.g. apks-2026-06-23). Leave empty for workflow-only artifacts.
        required: false
        type: string
  push:
    tags:
      - 'apks-*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install patch tools
        run: bash scripts/ci-install-tools.sh

      - name: Prepare signing keystore
        env:
          KEYSTORE_JKS_B64: ${{ secrets.KEYSTORE_JKS_B64 }}
          KEYSTORE_STORE_PASS: ${{ secrets.KEYSTORE_STORE_PASS }}
          KEYSTORE_KEY_PASS: ${{ secrets.KEYSTORE_KEY_PASS }}
        run: bash scripts/ci-prepare-signing.sh

      - name: Build patched APKs
        env:
          BUILD_APPS: ${{ github.event_name == 'workflow_dispatch' && inputs.apps || 'shealth' }}
          SHEALTH_APK_URL: ${{ secrets.SHEALTH_APK_URL }}
          WEARABLE_APK_URL: ${{ secrets.WEARABLE_APK_URL }}
          ACCESSORYSERVICE_APK_URL: ${{ secrets.ACCESSORYSERVICE_APK_URL }}
        run: bash scripts/ci-build-release.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patched-apks
          path: release-artifacts/*.apk
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/apks-') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          name: Patched Samsung APKs ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          files: release-artifacts/*.apk
          generate_release_notes: true
